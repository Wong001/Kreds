# Runs the full test suite on every push/PR. windows-latest is deliberate:
# App-lock's at-rest sealing uses Windows DPAPI and the desktop shell tests
# exercise Windows-only paths - the suite's full 675 only pass on Windows.
name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest -q
